name: Audio Forensic Pipeline
on: [push]

permissions:
  contents: write

jobs:
  forensic-job:
    runs-on: ubuntu-latest # This is the 'Worker' GitHub provides
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Forensic Tools (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install librosa numpy matplotlib

      - name: Run Forensic Analysis
        run: python analyzer.py

      - name: Save Results to Repo
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add map_*.png data_*.json
          # This line prevents the 'nothing to commit' error
          git diff-index --quiet HEAD || git commit -m "Forensic Audit Complete [skip ci]"
          git push




