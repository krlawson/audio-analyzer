name: Fast Audio Analysis
on:
  push:
    paths:
      - 'uploads/**' # Runs only when you add music

permissions:
  contents: write
  packages: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/forensic-studio:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # The 'Handshake'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Forensic Analysis
        run: python analyzer.py

      - name: Save Results to Repo
        run: |
          # 1. THE GEOGRAPHY FIX
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          
          # 2. Setup Identity
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          
          # 3. Add and Commit BEFORE pulling
          # This clears the 'Unstaged Changes' error
          git add "map_*.png" "data_*.json"
          git diff --staged --quiet || git commit -m "Forensic Batch Update [skip ci]"

          # 4. Sync and Push
          # Now that the maps are committed, the rebase will work
          git pull origin main --rebase
          git push










