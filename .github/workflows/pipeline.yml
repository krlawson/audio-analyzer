name: Fast Audio Analysis
on:
  push:
    paths:
      - 'uploads/**'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/audio-processor:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Batch Analysis
        run: python analyzer.py

      - name: Push Results
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add map_*.png data_*.json
          git commit -m "Forensic Batch Update [skip ci]" || echo "No changes"
          git push



