name: Fast Audio Analysis
on:
  push:
    paths:
      - 'uploads/**' # Runs only when you add music

permissions:
  contents: write
  packages: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/forensic-studio:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # The 'Handshake'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Forensic Analysis
        run: python analyzer.py

      - name: Save Results to Repo
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          
          # Quotes handle the spaces in your filenames
          git add "map_*.png" "data_*.json"
          
          # Only push if there's actually new data
          git diff --staged --quiet || git commit -m "Forensic Batch Update [skip ci]"
          git push







