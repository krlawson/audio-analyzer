name: Audio Forensic Pipeline
on: [push]

permissions:
  contents: write

jobs:
  forensic-job:
    runs-on: ubuntu-latest # This is the 'Worker' GitHub provides
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Forensic Tools (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install librosa numpy matplotlib

      - name: List Uploaded Files
        run: ls -R uploads/


      - name: Run Forensic Analysis
        run: python analyzer.py

      - name: Save Results to Repo
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          
          # Check if ANY maps were actually created
          if ls map_*.png 1> /dev/null 2>&1; then
            git add map_*.png data_*.json
            git commit -m "Forensic Batch Update [skip ci]"
            git push
          else
            echo "Physical results (map_*.png) are missing. Printing directory for debug:"
            ls -R
            exit 1
          fi





